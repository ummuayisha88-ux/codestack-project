{% extends 'base.html'%}

{% block content %}
<div class="payment-container">

    <div class="payment-card">

        <h3>💳 Secure Checkout</h3>

        <p class="course-title">{{ course.title }}</p>

        <h2 class="price">₹ {{ course.price }}</h2>

        <form method="POST">
            {% csrf_token %}
            <button class="pay-btn">Pay Now</button>
        </form>

    </div>

</div>

{%endblock%}
