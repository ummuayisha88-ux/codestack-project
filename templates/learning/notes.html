{% extends 'base.html' %}
{% block content %}

 <div class="row">

        {% for note in notes %}
        <div class="col-md-6">

            <div class="card note-card shadow-sm mb-4">
                <div class="card-body d-flex justify-content-between align-items-center">

                    
                    <div>
                        <h5 class="mb-1">{{ note.title }}</h5>
                        <small class="text-muted">Study Material</small>
                    </div>

                    
                    <a href="{{ note.file.url }}" target="_blank" class="btn btn-success btn-sm">
                        📥 Download
                    </a>

                </div>
            </div>
    </div>
{% empty %}
    <p>No notes available</p>
{% endfor %}

</div>

{% endblock %}
